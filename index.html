<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aion's Sticker</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fff7fb;
      --card: rgba(255, 255, 255, 0.78);
      --text: #3d3340;
      --muted: #7b6f7e;
      --line: rgba(174, 118, 158, 0.24);
      --accent: #d16ba5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #ffe0ef 0, transparent 34%), var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 40px 20px 72px;
    }
    header { margin-bottom: 28px; }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }
    .subtitle { color: var(--muted); margin: 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 14px 38px rgba(95, 62, 85, 0.08);
      backdrop-filter: blur(10px);
    }
    .sticker-frame {
      min-height: 190px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.52);
      border: 1px dashed var(--line);
      padding: 14px;
    }
    .sticker-frame img {
      width: min(180px, 100%);
      height: auto;
      display: block;
    }
    h2 { margin: 14px 0 4px; font-size: 1.1rem; }
    code {
      color: var(--accent);
      background: rgba(209, 107, 165, 0.1);
      border-radius: 8px;
      padding: 2px 6px;
    }
    .tags {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      font-size: 0.8rem;
      color: var(--accent);
      background: rgba(209, 107, 165, 0.1);
      border: 1px solid rgba(209, 107, 165, 0.18);
      border-radius: 999px;
      padding: 2px 9px;
    }
    .note {
      margin-top: 28px;
      color: var(--muted);
      font-size: 0.94rem;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Aion's Sticker</h1>
      <p class="subtitle">表情包库预览页。图片本体在 <code>stickers/</code>，调用规则在 <code>stickers.json</code>。</p>
    </header>

    <section class="grid" aria-label="Sticker gallery">
      <article class="card">
        <div class="sticker-frame">
          <img src="stickers/001-rabbit-tietie.png" alt="001-兔兔贴贴" />
        </div>
        <h2>001-兔兔贴贴</h2>
        <p>表达贴贴、抱抱、亲亲、轻甜靠近、甜甜和好。</p>
        <div class="tags">
          <span class="tag">贴贴</span>
          <span class="tag">抱抱</span>
          <span class="tag">亲亲</span>
          <span class="tag">轻甜</span>
        </div>
      </article>
    </section>

    <p class="note">启用 GitHub Pages 后，可用 HTTPS 图片地址在 Markdown 中调用。</p>
  </main>
</body>
</html>
